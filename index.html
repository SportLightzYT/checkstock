<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PKPAINT สต็อกสินค้า</title>

<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans Thai',sans-serif;background:#f0f2f5;color:#333;padding:8px;padding-bottom:80px}
.top-bar{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:12px 16px;border-radius:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.top-bar h1{font-size:18px;font-weight:700}
.top-bar .stats{display:flex;gap:8px;flex-wrap:wrap;font-size:12px}
.stat-badge{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:20px;white-space:nowrap}
.stat-badge.green{background:#4caf50;color:#fff}
.stat-badge.red{background:#f44336;color:#fff}
.stat-badge.orange{background:#ff9800;color:#fff}
.controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.controls input,.controls select{flex:1;min-width:120px;padding:10px 14px;border:1px solid #ddd;border-radius:10px;font-size:14px;background:#fff;outline:none}
.controls input:focus,.controls select:focus{border-color:#1a237e;box-shadow:0 0 0 3px rgba(26,35,126,.1)}
.controls .btn-group{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:10px 16px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s}
.btn-primary{background:#1a237e;color:#fff}.btn-primary:hover{background:#283593}
.btn-success{background:#2e7d32;color:#fff}.btn-success:hover{background:#388e3c}
.btn-warning{background:#e65100;color:#fff}.btn-warning:hover{background:#ef6c00}
.btn-outline{background:#fff;color:#333;border:1px solid #ddd}.btn-outline:hover{background:#f5f5f5}
.btn:active{transform:scale(.96)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.product-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:.2s;border:1px solid #eee}
.card-img-wrap{position:relative;width:100%;padding-top:66%;background:#fafafa;overflow:hidden}
.card-img-wrap img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;padding:8px;transition:.3s}
.card-body{padding:10px 12px 12px}
.card-body .name{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-body .name a{color:#1a237e;text-decoration:none}
.card-body .meta{font-size:11px;color:#888;margin-bottom:6px;display:flex;gap:6px;flex-wrap:wrap}
.card-body .meta span{background:#f0f2f5;padding:2px 8px;border-radius:4px;white-space:nowrap}
.card-body .price{font-size:16px;font-weight:700;color:#d32f2f;margin-bottom:8px}
.stock-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.stock-row label{font-size:11px;color:#666;min-width:50px}
.stock-row input{flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;text-align:center;width:0;min-width:0;outline:none}
.stock-row input:focus{border-color:#1a237e}
.stock-row .add-input{flex:0 0 60px;border:1px solid #4caf50;background:#f1f8e9;color:#2e7d32;font-weight:600}
.stock-row .add-input:focus{border-color:#2e7d32;box-shadow:0 0 0 2px rgba(76,175,80,.15)}
.stock-row .add-btn{flex:0 0 36px;height:36px;border:none;border-radius:8px;background:#4caf50;color:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.stock-row .add-btn:hover{background:#388e3c}
.stock-row .add-btn:active{transform:scale(.9)}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:20px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto}
.modal-box h2{font-size:16px;margin-bottom:12px}
.modal-box .form-row{margin-bottom:10px}
.modal-box .form-row label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.modal-box .form-row input,.modal-box .form-row select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.modal-box .form-row input:focus,.modal-box .form-row select:focus{border-color:#1a237e}
.modal-actions{display:flex;gap:8px;margin-top:12px}
.modal-actions .btn{flex:1}
.stock-total{font-size:14px;font-weight:700;padding:6px 0;display:flex;justify-content:space-between;align-items:center}
.stock-total .total-val{color:#1a237e}
.status-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.status-instock{background:#e8f5e9;color:#2e7d32}
.status-low{background:#fff3e0;color:#e65100}
.status-out{background:#fbe9e7;color:#c62828}
.card-actions{display:flex;gap:6px;margin-top:6px}
.card-actions .btn{flex:1;padding:8px;font-size:12px;text-align:center}
.empty-state{text-align:center;padding:60px 20px;color:#999;grid-column:1/-1}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:1000;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:480px){body{padding:4px}.product-grid{grid-template-columns:1fr}.controls input,.controls select{min-width:80px;font-size:13px;padding:8px 10px}.btn{padding:8px 12px;font-size:13px}.top-bar h1{font-size:15px}.stock-row input{padding:10px 8px;font-size:16px}}</style>
</head>
<body>

<div class="top-bar">
  <h1>PKPAINT สต็อกสินค้า</h1>
  <div class="stats">
    <span class="stat-badge" id="statTotal">ทั้งหมด: 0</span>
    <span class="stat-badge green" id="statInStock">มี: 0</span>
    <span class="stat-badge orange" id="statLowStock">ใกล้หมด: 0</span>
    <span class="stat-badge red" id="statOutStock">หมด: 0</span>
  </div>
</div>

<div class="controls">
  <input type="text" id="searchInput" placeholder="ค้นหา..." oninput="render()">
  <select id="catFilter" onchange="render()"><option value="">ทั้งหมด</option></select>
  <select id="brandFilter" onchange="render()"><option value="">ยี่ห้อทั้งหมด</option></select>
  <div class="btn-group">
    <button class="btn btn-success" onclick="saveAll()">เซฟทั้งหมด</button>
    <button class="btn btn-primary" onclick="openAddProduct()">+ เพิ่มสินค้า</button>
    <button class="btn btn-warning" onclick="exportTxt()">.txt</button>
    <button class="btn btn-warning" onclick="exportCsv()" style="background:#0277bd">.csv</button>
    <button class="btn btn-warning" onclick="exportXlsx()" style="background:#2e7d32">.xlsx</button>
  </div>
</div>

<div class="product-grid" id="productGrid"></div>
<div id="toast" class="toast"></div>

<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <h2>เพิ่มสินค้าใหม่</h2>
    <div class="form-row"><label>ชื่อสินค้า</label><input id="addName" placeholder="ชื่อสินค้า"></div>
    <div class="form-row"><label>หมวดหมู่</label><select id="addCat"></select></div>
    <div class="form-row"><label>ยี่ห้อ</label><select id="addBrand"></select></div>
    <div class="form-row"><label>ราคา</label><input id="addPrice" type="number" placeholder="0"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeAddProduct()">ยกเลิก</button>
      <button class="btn btn-success" onclick="submitAddProduct()">เพิ่ม</button>
    </div>
  </div>
</div>

var stock = (function(){try{return JSON.parse(localStorage.getItem("ps"))||{}}catch(e){return {}}})();
function saveStock(){localStorage.setItem("ps",JSON.stringify(stock))}

function initFilters(){
  var c={},b={},p,o;
  for(var i=0;i<PRODUCTS.length;i++){p=PRODUCTS[i];c[p.category]=1;b[p.brand]=1}
  var ce=document.getElementById("catFilter"),be=document.getElementById("brandFilter");
  for(var k in c){o=document.createElement("option");o.value=k;o.textContent=k;ce.appendChild(o)}
  for(var k in b){o=document.createElement("option");o.value=k;o.textContent=k;be.appendChild(o)}
}

function updateStats(){
  var d=0,t=0,l=0,o=0,i,p,s,pc,arr;
  for(i=0;i<PRODUCTS.length;i++){
    p=PRODUCTS[i];arr=(p.brand==="NAKOYA"||p.brand==="SHOPPER")?["กระป๋อง","แกลอน"]:[""];
    for(var j=0;j<arr.length;j++){
      d++;s=stock[p.id+(arr[j]?"_"+arr[j]:"")]||{p:0,b:0,q:0};
      pc=(s.p||0)+((s.b||0)*(s.q||0));if(pc>10)t++;else if(pc>0)l++;else o++;
    }
  }
  document.getElementById("statTotal").textContent="ทั้งหมด: "+d;
  document.getElementById("statInStock").textContent="มี: "+t;
  document.getElementById("statLowStock").textContent="ใกล้หมด: "+l;
  document.getElementById("statOutStock").textContent="หมด: "+o
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function render(){
  var q=document.getElementById("searchInput").value.trim().toLowerCase();
  var cv=document.getElementById("catFilter").value,bv=document.getElementById("brandFilter").value;
  var g=document.getElementById("productGrid"),h="",n=0,i,p,pi,pc,x,ne,ie,se,sc,st;
  for(i=0;i<PRODUCTS.length;i++){
    p=PRODUCTS[i];
    if(q&&!p.name.toLowerCase().includes(q)&&!p.title.toLowerCase().includes(q))continue;
    if(cv&&p.category!==cv)continue;
    if(bv&&p.brand!==bv)continue;
    n++;pi=p.id;var isSz=(p.brand==="NAKOYA"||p.brand==="SHOPPER");var curSz=isSz?"กระป๋อง":"";
    x=stock[pi+(curSz?"_"+curSz:"")]||{p:0,b:0,q:0};
    pc=(x.p||0)+((x.b||0)*(x.q||0));
    sc=pc>10?"status-instock":(pc>0?"status-low":"status-out");
    st=pc>10?"มีสต็อก":(pc>0?"เหลือ":"หมด");
    ne=esc(p.name);ie=esc(p.img);se=esc(p.shopee_url);
    h+="<div class=\"product-card\" data-id=\""+pi+"\" data-sz=\""+curSz+"\">";
    h+="<div class=\"card-img-wrap\"><img src=\""+ie+"\" alt=\""+ne+"\" loading=\"lazy\" onerror=\"this.remove()\"></div>";
    h+="<div class=\"card-body\">";
    h+="<div class=\"name\"><a href=\""+se+"\" target=\"_blank\">"+ne+"</a></div>";
    h+="<div class=\"meta\"><span>"+esc(p.category)+"</span><span>"+esc(p.brand)+"</span></div>";
    h+="<div class=\"price\">฿"+p.price.toLocaleString()+"</div>";
    if(isSz){
      h+="<div class=\"stock-row\"><label>ขนาด</label><select class=\"su\" style=\"flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none\" onchange=\"switchSz("+pi+",this)\">";
      h+="<option value=\"กระป๋อง\">กระป๋อง</option>";
      h+="<option value=\"แกลอน\">แกลอน</option>";
      h+="</select></div>";
    }
    h+="<div class=\"stock-row\"><label>ชิ้น</label><input type=\"number\" min=\"0\" class=\"sp\" value=\""+(x.p||0)+"\" onchange=\"c("+pi+")\" onfocus=\"this.select()\"><input type=\"number\" min=\"0\" class=\"add-input ap\" placeholder=\"+\" onfocus=\"this.select()\"><button class=\"add-btn\" onclick=\"addP("+pi+")\">+</button></div>";
    h+="<div class=\"stock-row\"><label>กล่อง</label><input type=\"number\" min=\"0\" class=\"sb\" value=\""+(x.b||0)+"\" onchange=\"c("+pi+")\" onfocus=\"this.select()\"></div>";
    h+="<div class=\"stock-row\"><label>/กล่อง</label><input type=\"number\" min=\"0\" class=\"sq\" value=\""+(x.q||0)+"\" placeholder=\"ชิ้น\" onchange=\"c("+pi+")\" onfocus=\"this.select()\"></div>";
    h+="<div class=\"stock-total\"><span>รวม</span><span class=\"total-val\" id=\"t"+pi+"\">"+pc+" ชิ้น</span></div>";
    h+="<div style=\"text-align:right;margin-bottom:4px\"><span class=\"status-badge "+sc+"\">"+st+"</span></div>";
    h+="<div class=\"card-actions\">";
    h+="<button class=\"btn btn-primary\" onclick=\"s1("+pi+")\">เซฟ</button>";
    h+="</div></div></div>"
  }
  g.innerHTML=n?h:"<div class=\"empty-state\" style=\"text-align:center;padding:60px 20px;color:#999;grid-column:1/-1\"><div style=\"font-size:48px\">?</div><div>ไม่พบสินค้า</div></div>";
  updateStats()
}

function c(id){
  var cd=document.querySelector('.product-card[data-id="'+id+'"]');if(!cd)return;
  var p=parseInt(cd.querySelector(".sp").value)||0,b=parseInt(cd.querySelector(".sb").value)||0,q=parseInt(cd.querySelector(".sq").value)||0;
  var pc=p+(b*q); document.getElementById("t"+id).textContent=pc+" ชิ้น";
  var sc=pc>10?"status-instock":(pc>0?"status-low":"status-out"), st=pc>10?"มีสต็อก":(pc>0?"เหลือ":"หมด");
  var sbj=cd.querySelector(".status-badge");if(sbj){sbj.className="status-badge "+sc;sbj.textContent=st;}
}

function addP(id){
  var cd=document.querySelector('.product-card[data-id="'+id+'"]');if(!cd)return;
  var sp=cd.querySelector(".sp"),ap=cd.querySelector(".ap"),v=parseInt(ap.value)||0;
  if(v<=0){t("ใส่จำนวนที่ต้องการเพิ่ม");return;}
  sp.value=(parseInt(sp.value)||0)+v; ap.value=""; c(id);
  t("+"+v+" ชิ้น")
}

function switchSz(id,sel){
  var cd=document.querySelector('.product-card[data-id="'+id+'"]');if(!cd)return;
  var os=cd.dataset.sz; stock[id+(os?"_"+os:"")]={p:parseInt(cd.querySelector(".sp").value)||0,b:parseInt(cd.querySelector(".sb").value)||0,q:parseInt(cd.querySelector(".sq").value)||0};
  var ns=sel.value; cd.dataset.sz=ns; var s=stock[id+"_"+ns]||{p:0,b:0,q:0};
  cd.querySelector(".sp").value=s.p||0; cd.querySelector(".sb").value=s.b||0; cd.querySelector(".sq").value=s.q||0;
  c(id);saveStock();updateStats();
}

function s1(id){
  var cd=document.querySelector('.product-card[data-id="'+id+'"]');if(!cd)return;
  var sz=cd.dataset.sz||""; stock[id+(sz?"_"+sz:"")]={p:parseInt(cd.querySelector(".sp").value)||0,b:parseInt(cd.querySelector(".sb").value)||0,q:parseInt(cd.querySelector(".sq").value)||0};
  saveStock();updateStats();t("เซฟแล้ว")
}

function saveAll(){
  var cards=document.querySelectorAll(".product-card"),i,id,sz;
  for(i=0;i<cards.length;i++){id=parseInt(cards[i].dataset.id);sz=cards[i].dataset.sz||"";stock[id+(sz?"_"+sz:"")]={p:parseInt(cards[i].querySelector(".sp").value)||0,b:parseInt(cards[i].querySelector(".sb").value)||0,q:parseInt(cards[i].querySelector(".sq").value)||0}}
  saveStock();updateStats();t("เซฟทั้งหมดแล้ว")
}

function t(m){var e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(e._t);e._t=setTimeout(function(){e.classList.remove("show")},2500)}

function exportTxt(){
  var n=new Date(),ds=n.toLocaleDateString("th-TH",{year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"});
  var l=["==============================================","   PKPAINT รายงานสต็อกสินค้า","   วันที่: "+ds,"==============================================",""];
  var hs=[],ns=[],i,j,p,s,pc,itm,arr,sz;
  for(i=0;i<PRODUCTS.length;i++){
    p=PRODUCTS[i];arr=(p.brand==="NAKOYA"||p.brand==="SHOPPER")?["กระป๋อง","แกลอน"]:[""];
    for(j=0;j<arr.length;j++){
      sz=arr[j];s=stock[p.id+(sz?"_"+sz:"")]||{p:0,b:0,q:0};pc=(s.p||0)+((s.b||0)*(s.q||0));
      itm={p:p,pcs:s.p||0,box:s.b||0,ppb:s.q||0,total:pc,u:sz};if(pc>0||s.p>0||s.b>0)hs.push(itm);else ns.push(itm);
    }
  }
  l.push("--- มีสต็อก ("+hs.length+") ---");l.push("");
  for(i=0;i<hs.length;i++){itm=hs[i];l.push((i+1)+". "+itm.p.name);var ustr=itm.u?" | ขนาด: "+itm.u:"";l.push("   หมวด: "+itm.p.category+" | ยี่ห้อ: "+itm.p.brand+ustr);l.push("   สต็อก: ชิ้น "+itm.pcs+" | กล่อง "+itm.box+" (x"+itm.ppb+"/กล่อง)");l.push("   รวม: "+itm.total+" ชิ้น");l.push("   --------------------------------------")}
  l.push("");l.push("--- หมดสต็อก ("+ns.length+") ---");l.push("");
  for(i=0;i<ns.length;i++){l.push((i+1)+". "+ns[i].p.name);l.push("   หมวด: "+ns[i].p.category+" | ยี่ห้อ: "+ns[i].p.brand);l.push("   --------------------------------------")}
  l.push("");l.push("==============================================");l.push("   รวมทั้งหมด: "+PRODUCTS.length+" รายการ");l.push("   มีสต็อก: "+hs.length+" รายการ");l.push("   หมดสต็อก: "+ns.length+" รายการ");l.push("==============================================");
  var txt=l.join("\n"),b=new Blob([txt],{type:"text/plain;charset=utf-8"}),u=URL.createObjectURL(b);
  var a=document.createElement("a");a.href=u;a.download="PKPAINT_Stock_"+n.toISOString().slice(0,10)+".txt";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);t("Export แล้ว")
}

function exportCsv(){
  var r=[["หมวดหมู่","ยี่ห้อ","ชื่อสินค้า","ชิ้น","กล่อง","/กล่อง","รวม(ชิ้น)","ขนาด"]];
  for(var i=0;i<PRODUCTS.length;i++){var p=PRODUCTS[i],arr=(p.brand==="NAKOYA"||p.brand==="SHOPPER")?["กระป๋อง","แกลอน"]:[""];for(var j=0;j<arr.length;j++){var sz=arr[j],s=stock[p.id+(sz?"_"+sz:"")]||{p:0,b:0,q:0},pc=(s.p||0)+((s.b||0)*(s.q||0));r.push([p.category,p.brand,p.name,s.p||0,s.b||0,s.q||0,pc,sz]);}}
  var c="\uFEFF"+r.map(function(e){return e.map(function(itm){return "\""+String(itm).replace(/"/g,'""')+"\""}).join(",")}).join("\n");

  a.href=u;a.download="PKPAINT_Stock.csv";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);t("Export CSV สำเร็จ")
}

function openAddProduct(){
  document.getElementById("addModal").classList.add("show");
  var cs=document.getElementById("addCat"),bs=document.getElementById("addBrand");
  cs.innerHTML="";bs.innerHTML="";
  var cc={},bb={};for(var i=0;i<PRODUCTS.length;i++){cc[PRODUCTS[i].category]=1;bb[PRODUCTS[i].brand]=1;}
  for(var k in cc){var o=document.createElement("option");o.value=k;o.textContent=k;cs.appendChild(o);}
  for(var k in bb){var o=document.createElement("option");o.value=k;o.textContent=k;bs.appendChild(o);}
}

function closeAddProduct(){document.getElementById("addModal").classList.remove("show");}

function submitAddProduct(){
  var nm=document.getElementById("addName").value.trim();
  if(!nm){t("กรุณาใส่ชื่อสินค้า");return;}
  var maxId=0;for(var i=0;i<PRODUCTS.length;i++){if(PRODUCTS[i].id>maxId)maxId=PRODUCTS[i].id;}
  var np={id:maxId+1,category:document.getElementById("addCat").value,brand:document.getElementById("addBrand").value,price:parseInt(document.getElementById("addPrice").value)||0,name:nm,title:nm,img:"",shopee_url:"",price_text:document.getElementById("addPrice").value||"0",views:0,shopee_clicks:0,active:1};
  PRODUCTS.push(np);closeAddProduct();render();t("เพิ่มสินค้าแล้ว: "+nm);
  document.getElementById("addName").value="";document.getElementById("addPrice").value="";
}
